name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync
        uses: dabreadman/sync-upstream-repo@v1.3.0
        with:
          upstream_repo: KuekHaoYang/KVideo
          upstream_branch: main
          downstream_branch: main
          token: ${{ secrets.GITHUB_TOKEN }}
