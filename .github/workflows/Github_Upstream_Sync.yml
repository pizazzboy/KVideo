name: Upstream Sync

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: KuekHaoYang/KVideo
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: upstream-sync-conflict

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync and Merge (with PR Fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加上游仓库
          git remote get-url upstream || git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream $UPSTREAM_BRANCH

          echo "Merging upstream..."
          if git merge upstream/$UPSTREAM_BRANCH; then
            echo "✅ Merge successful"
            # 🔥 核心修复：用 Token 授权推送，彻底解决用户名错误
            git push "https://${GH_TOKEN}@github.com/${{ github.repository }}.git" $TARGET_BRANCH
          else
            echo "⚠️ Merge conflict detected"
            git merge --abort
            git checkout -B $SYNC_BRANCH upstream/$UPSTREAM_BRANCH
            git push -f "https://${GH_TOKEN}@github.com/${{ github.repository }}.git" $SYNC_BRANCH
            gh pr create --title "🚨 Manual Sync Required" --body "Please resolve conflicts" --head $SYNC_BRANCH --base $TARGET_BRANCH || true
          fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
